name: android-apk

# Android APK をビルドして配布する（リポジトリ直下が静的PWA＋Capacitor構成）。
#  - main への push / 手動実行 … ビルドして APK を「Actions artifact」として上げる（Release は作らない）。
#  - タグ v* の push          … 上記に加え、そのタグで GitHub Release を作成し APK を添付する。
# 注意: ここで作るのは未署名の DEBUG APK（動作確認・配布テスト用）。
#   Play ストア等への正式公開には、署名付き release ビルド（assembleRelease＋keystore を
#   GitHub Secrets で注入）への差し替えが必要。
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # リリース作成・APK 添付に必要

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17" # Capacitor 6 / AGP 8 の基準（CAPACITOR.md と一致）
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps & build web (www/)
        run: |
          npm ci
          npm run build
      - name: Generate Android project (Capacitor)
        run: npx cap add android
      - name: Set Android version (versionName=package.json, versionCode=run number)
        run: |
          GRADLE=android/app/build.gradle
          VER=$(node -p "require('./package.json').version")
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"$VER\"/" "$GRADLE"
          sed -i -E "s/versionCode [0-9]+/versionCode ${{ github.run_number }}/" "$GRADLE"
          echo "versionName=$VER versionCode=${{ github.run_number }}"
          grep -E "versionName|versionCode" "$GRADLE" || true
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/droidhaz-debug.apk
      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: droidhaz-debug.apk
          path: dist/droidhaz-debug.apk
          if-no-files-found: warn
      # Release はタグ push 時のみ作成（main への通常 push では作らない＝固定タグ上書き事故を防ぐ）。
      # tag_name は push されたタグから自動採用される。
      - name: Publish APK to GitHub Release (on tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          prerelease: true
          files: dist/droidhaz-debug.apk
