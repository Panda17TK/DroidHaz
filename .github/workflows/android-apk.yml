name: android-apk

# Android デバッグ APK をビルドして配布する（リポジトリ直下が静的PWA＋Capacitor構成）。
# 実行: main へ push、または Actions → "android-apk" → Run workflow。
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write # リリース作成・APK 添付に必要

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps & build web (www/)
        run: |
          npm install
          npm run build
      - name: Generate Android project (Capacitor)
        run: npx cap add android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/droidhaz-debug.apk
      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: droidhaz-debug.apk
          path: dist/droidhaz-debug.apk
          if-no-files-found: warn
      - name: Publish APK to GitHub Release (v1.0.0, prerelease)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: DroidHaz v1.0.0
          body_path: RELEASE_NOTES.md
          prerelease: true
          files: dist/droidhaz-debug.apk
